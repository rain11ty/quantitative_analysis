<div class="card-body">
<div id="moneyflow-content">

 {% block extra_js %}

<script>const tsCode = '{{ ts_code }}';

let stockInfo = null;

// ECharts 实例管理（防止内存泄漏）
const _chartInstances = {};

function _safeInitChart(id) {
    if (_chartInstances[id]) {
        _chartInstances[id].dispose();
    }
    const el = document.getElementById(id);
    if (!el) return null;
    _chartInstances[id] = echarts.init(el);
    return _chartInstances[id];
}

// 页面加载完成后初始化

document.addEventListener('DOMContentLoaded', function() {
 // 全局 resize：只绑定一次，处理所有 ECharts 实例
 window.addEventListener('resize', function() {
     Object.values(_chartInstances).forEach(chart => {
         if (chart && !chart.isDisposed()) chart.resize();
     });
 });

 // 页面卸载时释放所有 ECharts 实例
 window.addEventListener('beforeunload', function() {
     Object.values(_chartInstances).forEach(chart => {
         if (chart && !chart.isDisposed()) chart.dispose();
     });
 });

 loadStockInfo();
 loadHistoryData(60); // 默认加载60天数据
 // 绑定标签页切换事件
 document.querySelectorAll('#stockTabs button[data-bs-toggle="tab"]').forEach(tab => {
 tab.addEventListener('shown.bs.tab', function(event) {
 const target = event.target.getAttribute('data-bs-target');
 switch(target) {
 case '#factors':
 loadFactorsData();
 break;
 case '#moneyflow':
 loadMoneyflowData();
 break;
 case '#cyq':
 loadCyqData();
 break;
 }
 });
 });

});
 // 加载股票基本信息

async function loadStockInfo() {
 try {
 const response = await apiRequest(`/stocks/${tsCode}`);
 if (response.code === 200) {
 stockInfo = response.data;
 renderStockInfo(stockInfo);
 } else {
 showError('stock-info', '股票信息加载失败');
 }
 } catch (error) {
 showError('stock-info', '股票信息加载失败');
 console.error('加载股票信息失败:', error);
 }

}
 // 渲染股票基本信息

function renderStockInfo(stock) {
 const container = document.getElementById('stock-info');
 const html = `
  <div class="col-md-8">
<h3 class="mb-3">${stock.name} <small class="text-muted">(${stock.symbol})</small></h3>
<div class="row g-3">
<div class="col-md-6">
<div class="d-flex justify-content-between">
<span class="text-muted">股票代码:</span>
<strong>${stock.ts_code}</strong>
</div>
</div>
<div class="col-md-6">
<div class="d-flex justify-content-between">
<span class="text-muted">股票简称:</span>
<strong>${stock.symbol}</strong>
</div>
</div>
<div class="col-md-6">
<div class="d-flex justify-content-between">
<span class="text-muted">所属行业:</span>
<span class="badge bg-secondary">${stock.industry || '--'}</span>
</div>
</div>
<div class="col-md-6">
<div class="d-flex justify-content-between">
<span class="text-muted">所属地域:</span>
<span class="badge bg-info">${stock.area || '--'}</span>
</div>
</div>
<div class="col-md-6">
<div class="d-flex justify-content-between">
<span class="text-muted">上市日期:</span>
<strong>${stock.list_date || '--'}</strong>
</div>
</div>
<div class="col-md-6">
<div class="d-flex justify-content-between">
<span class="text-muted">市场:</span>
<span class="badge ${stock.ts_code.includes('SH') ? 'bg-danger' : stock.ts_code.includes('BJ') ? 'bg-warning' : 'bg-success'}"> ${stock.ts_code.includes('SH') ? '上海' : stock.ts_code.includes('BJ') ? '北交所' : '深圳'}
  </span>
</div>
</div>
</div>
</div>
<div class="col-md-4">
<div class="text-center">
<div class="card bg-light">
<div class="card-body">
<h5 class="card-title">快速操作</h5>
<div class="d-grid gap-2">
<button class="btn btn-primary btn-sm" onclick="addToWatchlist()"> ? 加入自选</button>
<button class="btn btn-success btn-sm" onclick="openAnalysis()"> ? 技术分析</button>
<button class="btn btn-info btn-sm" onclick="openBacktest()"> ? 策略回测</button>
</div>
</div>
</div>
</div>
</div> `;
 container.innerHTML = html;

}
 // 加载历史数据

async function loadHistoryData(days = 60) {
 // 切换按钮 active 状态
 document.querySelectorAll('.btn-group[role="group"] .btn').forEach(btn => {
     btn.classList.remove('active');
 });
 // 找到被点击的按钮（通过 onclick 中的天数匹配）
 const btnClicked = Array.from(document.querySelectorAll('.btn-group[role="group"] .btn'))
     .find(btn => btn.getAttribute('onclick') === `loadHistoryData(${days})`);
 if (btnClicked) btnClicked.classList.add('active');

 showLoading('history-content');
 try {
 const response = await apiRequest(`/stocks/${tsCode}/history?limit=${days}`);
 if (response.code === 200) {
 renderHistoryData(response.data, days);
 } else {
 showError('history-content', '历史数据加载失败');
 }
 } catch (error) {
 showError('history-content', '历史数据加载失败');
 console.error('加载历史数据失败:', error);
 }

}
 // 渲染历史数据

function renderHistoryData(data, days) {
 const container = document.getElementById('history-content');
 if (!data || data.length === 0) {
 container.innerHTML = '<div class="text-center py-4"><p class="text-muted">暂无历史数据</p></div>';
 return;
 }

 const PAGE_SIZE = 30;
 const totalRows = data.length;
 // 始终只渲染第一页，避免大量 DOM 导致卡顿
 const displayData = data.slice(0, PAGE_SIZE);

 const html = `
  <div class="mb-3 d-flex justify-content-between align-items-center">
<small class="text-muted mb-0">最近 ${days} 天的历史数据，共 ${totalRows} 条记录（按时间倒序）</small>
<span id="history-page-info" class="text-muted small">显示 1-${Math.min(PAGE_SIZE, totalRows)} / ${totalRows}</span>
</div>
<div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
<table class="table table-sm table-hover table-striped mb-0" style="min-width: 700px;">
<thead class="sticky-top">
<tr>
<th>日期</th>
<th>开盘价</th>
<th>最高价</th>
<th>最低价</th>
<th>收盘价</th>
<th>成交量(万手)</th>
<th>成交额(万元)</th>
<th>涨跌幅</th>
</tr>
</thead>
<tbody id="history-tbody"> ${displayData.map(item => `
  <tr>
<td><strong>${item.trade_date || '--'}</strong></td>
<td>${formatNumber(item.open, 2)}</td>
<td class="text-danger">${formatNumber(item.high, 2)}</td>
<td class="text-success">${formatNumber(item.low, 2)}</td>
<td class="text-primary"><strong>${formatNumber(item.close, 2)}</strong></td>
<td>${formatNumber((item.vol || 0) / 10000, 1)}</td>
<td>${formatNumber((item.amount || 0) / 10000, 0)}</td>
<td class="${(item.pct_chg || 0) >= 0 ? 'text-danger' : 'text-success'}">
<strong>${formatPercent(item.pct_chg || 0)}</strong>
</td>
</tr> `).join('')}
  </tbody>
</table>
</div> ${totalRows > PAGE_SIZE ? `
<div class="d-flex justify-content-center gap-2 mt-3" id="history-pagination">
<button class="btn btn-sm btn-outline-primary" id="history-load-more" onclick="_loadMoreHistory(${PAGE_SIZE})">加载更多 (${PAGE_SIZE}/${totalRows})</button>
<button class="btn btn-sm btn-outline-secondary" onclick="_scrollToHistoryTop()">回到顶部</button>
</div>` : ''}
 `;
 container.innerHTML = html;

 // 将剩余数据挂载到按钮上供分页使用
 window._historyAllData = data;
 window._historyCurrentPage = 1;

}

// 分页加载更多
function _loadMoreHistory(pageSize) {
 const allData = window._historyAllData;
 if (!allData) return;
 window._historyCurrentPage++;
 const page = window._historyCurrentPage;
 const start = (page - 1) * pageSize;
 const end = start + pageSize;
 const chunk = allData.slice(start, end);
 const tbody = document.getElementById('history-tbody');
 if (!tbody) return;

 const newRows = chunk.map(item => `
<tr>
<td><strong>${item.trade_date || '--'}</strong></td>
<td>${formatNumber(item.open, 2)}</td>
<td class="text-danger">${formatNumber(item.high, 2)}</td>
<td class="text-success">${formatNumber(item.low, 2)}</td>
<td class="text-primary"><strong>${formatNumber(item.close, 2)}</strong></td>
<td>${formatNumber((item.vol || 0) / 10000, 1)}</td>
<td>${formatNumber((item.amount || 0) / 10000, 0)}</td>
<td class="${(item.pct_chg || 0) >= 0 ? 'text-danger' : 'text-success'}">
<strong>${formatPercent(item.pct_chg || 0)}</strong>
</td>
</tr>`).join('');
 tbody.insertAdjacentHTML('beforeend', newRows);

 // 更新分页信息和按钮
 const shown = Math.min(end, allData.length);
 const pageInfo = document.getElementById('history-page-info');
 if (pageInfo) pageInfo.textContent = `显示 1-${shown} / ${allData.length}`;

 const loadMoreBtn = document.getElementById('history-load-more');
 if (loadMoreBtn) {
     if (shown >= allData.length) {
         loadMoreBtn.textContent = '已全部加载';
         loadMoreBtn.disabled = true;
         loadMoreBtn.classList.replace('btn-outline-primary', 'btn-secondary');
     } else {
         loadMoreBtn.textContent = `加载更多 (${shown}/${allData.length})`;
     }
 }
}

function _scrollToHistoryTop() {
 const scrollContainer = document.querySelector('.table-responsive[style*="max-height"]');
 if (scrollContainer) scrollContainer.scrollTop = 0;
}
 // 加载技术因子数据

async function loadFactorsData() {
 if (document.getElementById('factors-content').innerHTML.includes('加载中')) return;
 showLoading('factors-content');
 try {
 const response = await apiRequest(`/stocks/${tsCode}/factors?limit=20`);
 if (response.code === 200) {
 renderFactorsData(response.data);
 } else {
 showError('factors-content', '技术因子数据加载失败');
 }
 } catch (error) {
 showError('factors-content', '技术因子数据加载失败');
 console.error('加载技术因子数据失败:', error);
 }

}
 // 渲染技术因子数据

function renderFactorsData(data) {
 const container = document.getElementById('factors-content');
 if (!data || data.length === 0) {
 container.innerHTML = '<div class="text-center py-4"><p class="text-muted">暂无技术因子数据</p></div>';
 return;
 }
 const html = `
  <div class="mb-3">
<small class="text-muted">技术因子数据，共 ${data.length} 条记录（按时间倒序，最新数据在前）</small>
</div>
<!-- 技术指标图表 -->
<div class="row mb-4">
<div class="col-12">
<div class="card">
<div class="card-header">
<h6 class="mb-0">? 技术指标趋势</h6>
</div>
<div class="card-body">
<div id="factors-chart" style="height: 400px;"></div>
</div>
</div>
</div>
</div>
<!-- 详细数据表格 -->
<div class="card">
<div class="card-header">
<h6 class="mb-0">? 详细数据</h6>
</div>
<div class="card-body">
<div class="table-responsive">
<table class="table table-sm table-hover">
<thead>
<tr>
<th>日期</th>
<th>收盘价</th>
<th>MACD DIF</th>
<th>MACD DEA</th>
<th>MACD</th>
<th>KDJ K</th>
<th>KDJ D</th>
<th>KDJ J</th>
<th>RSI(6)</th>
<th>RSI(12)</th>
<th>RSI(24)</th>
<th>布林上轨</th>
<th>布林中轨</th>
<th>布林下轨</th>
<th>CCI</th>
</tr>
</thead>
<tbody> ${data.slice(0, 50).map(item => `
  <tr>
<td><strong>${item.trade_date || '--'}</strong></td>
<td class="text-primary"><strong>${formatNumber(item.close, 2)}</strong></td>
<td class="${(item.macd_dif || 0) >= 0 ? 'text-danger' : 'text-success'}">${formatNumber(item.macd_dif, 4)}</td>
<td class="${(item.macd_dea || 0) >= 0 ? 'text-danger' : 'text-success'}">${formatNumber(item.macd_dea, 4)}</td>
<td class="${(item.macd || 0) >= 0 ? 'text-danger' : 'text-success'}">${formatNumber(item.macd, 4)}</td>
<td>${formatNumber(item.kdj_k, 2)}</td>
<td>${formatNumber(item.kdj_d, 2)}</td>
<td class="${(item.kdj_j || 0) >80 ? 'text-danger' : (item.kdj_j || 0) < 20 ? 'text-success' : ''}">${formatNumber(item.kdj_j, 2)}</td>
<td class="${(item.rsi_6 || 0) >70 ? 'text-danger' : (item.rsi_6 || 0) < 30 ? 'text-success' : ''}">${formatNumber(item.rsi_6, 2)}</td>
<td class="${(item.rsi_12 || 0) >70 ? 'text-danger' : (item.rsi_12 || 0) < 30 ? 'text-success' : ''}">${formatNumber(item.rsi_12, 2)}</td>
<td class="${(item.rsi_24 || 0) >70 ? 'text-danger' : (item.rsi_24 || 0) < 30 ? 'text-success' : ''}">${formatNumber(item.rsi_24, 2)}</td>
<td class="text-danger">${formatNumber(item.boll_upper, 2)}</td>
<td class="text-warning">${formatNumber(item.boll_mid, 2)}</td>
<td class="text-success">${formatNumber(item.boll_lower, 2)}</td>
<td class="${(item.cci || 0) >100 ? 'text-danger' : (item.cci || 0) < -100 ? 'text-success' : ''}">${formatNumber(item.cci, 2)}</td>
</tr> `).join('')}
  </tbody>
</table>
</div> ${data.length > 50 ? `<div class="text-center mt-3"><small class="text-muted">显示前50条，共${data.length}条记录</small></div>` : ''}
  </div>
</div> `;
 container.innerHTML = html;
 // 渲染技术指标图表
 renderFactorsChart(data);

}
 // 渲染技术指标图表

function renderFactorsChart(data) {
 const factorsChart = _safeInitChart('factors-chart');
 if (!factorsChart) return; // 渲染技术指标图表
 const reversedData = [...data].reverse();
 const dates = reversedData.map(item => item.trade_date);
 const factorsOption = {
 title: {
 text: '技术指标趋势',
 left: 'center'
 },
 tooltip: {
 trigger: 'axis',
 formatter: function(params) {
 let result = params[0].name + '<br/>';
 params.forEach(param => {
 result += param.marker + param.seriesName + ': ' + formatNumber(param.value, 4) + '<br/>';
 });
 return result;
 }
 },
 legend: {
 data: ['MACD DIF', 'MACD DEA', 'MACD', 'RSI(6)', 'RSI(12)', 'KDJ K', 'KDJ D'],
 top: 30,
 type: 'scroll'
 },
 grid: {
 left: '3%',
 right: '4%',
 bottom: '15%',
 containLabel: true
 },
 xAxis: {
 type: 'category',
 data: dates,
 axisLabel: {
 rotate: 45
 }
 },
 yAxis: [
 {
 type: 'value',
 name: 'MACD',
 position: 'left',
 axisLabel: {
 formatter: function(value) {
 return formatNumber(value, 4);
 }
 }
 },
 {
 type: 'value',
 name: 'RSI/KDJ',
 position: 'right',
 min: 0,
 max: 100,
 axisLabel: {
 formatter: function(value) {
 return value + '';
 }
 }
 }
 ],
 dataZoom: [
 {
 type: 'inside',
 start: 70,
 end: 100
 },
 {
 show: true,
 type: 'slider',
 top: '90%',
 start: 70,
 end: 100
 }
 ],
 series: [
 {
 name: 'MACD DIF',
 type: 'line',
 yAxisIndex: 0,
 data: reversedData.map(item => item.macd_dif || 0),
 itemStyle: { color: '#ff4d4f' },
 lineStyle: { width: 2 }
 },
 {
 name: 'MACD DEA',
 type: 'line',
 yAxisIndex: 0,
 data: reversedData.map(item => item.macd_dea || 0),
 itemStyle: { color: '#52c41a' },
 lineStyle: { width: 2 }
 },
 {
 name: 'MACD',
 type: 'bar',
 yAxisIndex: 0,
 data: reversedData.map(item => item.macd || 0),
 itemStyle: {
 color: function(params) {
 return params.value >= 0 ? '#ff4d4f' : '#52c41a';
 }
 }
 },
 {
 name: 'RSI(6)',
 type: 'line',
 yAxisIndex: 1,
 data: reversedData.map(item => item.rsi_6 || 0),
 itemStyle: { color: '#1890ff' }
 },
 {
 name: 'RSI(12)',
 type: 'line',
 yAxisIndex: 1,
 data: reversedData.map(item => item.rsi_12 || 0),
 itemStyle: { color: '#722ed1' }
 },
 {
 name: 'KDJ K',
 type: 'line',
 yAxisIndex: 1,
 data: reversedData.map(item => item.kdj_k || 0),
 itemStyle: { color: '#fa8c16' }
 },
 {
 name: 'KDJ D',
 type: 'line',
 yAxisIndex: 1,
 data: reversedData.map(item => item.kdj_d || 0),
 itemStyle: { color: '#13c2c2' }
 }
 ]
 };
 factorsChart.setOption(factorsOption);
}

 // 加载资金流向数据

async function loadMoneyflowData() {
 if (document.getElementById('moneyflow-content').innerHTML.includes('加载中')) return;
 showLoading('moneyflow-content');
 try {
 const response = await apiRequest(`/stocks/${tsCode}/moneyflow?limit=20`);
 if (response.code === 200) {
 renderMoneyflowData(response.data);
 } else {
 showError('moneyflow-content', '资金流向数据加载失败');
 }
 } catch (error) {
 showError('moneyflow-content', '资金流向数据加载失败');
 console.error('加载资金流向数据失败:', error);
 }

}
 // 渲染资金流向数据

function renderMoneyflowData(data) {
 const container = document.getElementById('moneyflow-content');
 if (!data || data.length === 0) {
 container.innerHTML = '<div class="text-center py-4"><p class="text-muted">暂无资金流向数据</p></div>';
 return;
 }

function formatNumber(num, decimals = 2) {
 if (num === null || num === undefined || isNaN(num)) return '--';
 return Number(num).toLocaleString('zh-CN', {
 minimumFractionDigits: decimals,
 maximumFractionDigits: decimals
 });

}
 function formatPercent(num) {
 if (num === null || num === undefined || isNaN(num)) return '--';
 const sign = num >= 0 ? '+' : '';
 return sign + Number(num).toFixed(2) + '%';

}
