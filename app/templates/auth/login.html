{% extends "base.html" %}
 {% block title %}用户登录 - 股票量化分析系统{% endblock %}
 {% block content %}

<div class="container py-4 py-lg-5">
<div class="row justify-content-center">
<div class="col-lg-10">
<div class="row g-4 align-items-stretch">
<div class="col-lg-5">
<div class="page-card h-100 p-4 p-lg-5">
<span class="badge bg-light text-primary border mb-3">访问说明</span>
<h1 class="h3 mb-3">登录后才可进入系统</h1>
<p class="text-muted mb-4">系统核心页面与接口均已启用会话鉴权，登录后可使用股票分析、筛选、回测和 AI 助手等功能。</p>
<div class="d-grid gap-3">
<div class="d-flex">
<div class="me-3 text-primary"></div>
<div>
<div class="fw-semibold">登录方式</div>
<small class="text-muted">支持用户名或邮箱配合密码登录</small>
</div>
</div>
<div class="d-flex">
<div class="me-3 text-success"></div>
<div>
<div class="fw-semibold">首次使用</div>
<small class="text-muted">可先完成注册，也可以通过忘记密码入口进行重置</small>
</div>
</div>
<div class="d-flex">
<div class="me-3 text-warning"></div>
<div>
<div class="fw-semibold">数据留痕</div>
<small class="text-muted">登录后会绑定个人中心、自选股、操作记录与 AI 问答历史</small>
</div>
</div>
</div>
</div>
</div>
<div class="col-lg-7">
<div class="page-card h-100 p-4 p-lg-5">
<form method="post">
<input type="hidden" name="next" value="{{ next_page or '' }}">
<div class="mb-3">
<label for="account" class="form-label">用户名或邮箱</label>
<input type="text" class="form-control" id="account" name="account" value="{{ request.form.get('account', '') }}" placeholder="请输入用户名或邮箱" required>
</div>
<div class="mb-3">
<label for="password" class="form-label">密码</label>
<input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
</div>
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
<div class="form-check">
<input class="form-check-input" type="checkbox" name="remember_me" id="remember_me" {% if request.form.get('remember_me') %}checked{% endif %}>
<label class="form-check-label" for="remember_me">记住登录状态</label>
</div>
<a class="small" href="{{ url_for('auth.forgot_password') }}">忘记密码？</a>
</div>
<div class="d-grid gap-2 d-md-flex">
<button type="submit" class="btn btn-primary flex-fill">立即登录</button>
<a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary flex-fill">去注册</a>
</div>
</form>
<hr class="my-4">
<p class="text-muted mb-2">需要管理员权限？<a href="{{ url_for('admin.login') }}">进入管理员后台登录</a></p>
</div>
</div>
</div>
</div>
</div>
</div> {% endblock %}
