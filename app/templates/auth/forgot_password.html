{% extends "base.html" %}
 {% block title %}找回密码 - 股票新手分析助手{% endblock %}
 {% block content %}

<div class="container py-4 py-lg-5">
<div class="row justify-content-center">
<div class="col-lg-6">
<div class="card card-financial">
<div class="card-body p-4 p-lg-5">
<h1 class="h4 mb-3">找回密码</h1>
<p class="text-muted">输入用户名或邮箱，设置新密码。</p>
<form method="post">
<div class="mb-3">
<label class="form-label" for="account">账号</label>
<input class="form-control" id="account" name="account" placeholder="用户名或邮箱" required>
</div>
<div class="mb-3">
<label class="form-label" for="new_password">新密码</label>
<input type="password" class="form-control" id="new_password" name="new_password" required>
</div>
<div class="mb-4">
<label class="form-label" for="confirm_password">确认新密码</label>
<input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
</div>
<div class="d-grid gap-2">
<button class="btn btn-primary" type="submit">重置密码</button>
<a class="btn btn-outline-secondary" href="{{ url_for('auth.login') }}">返回登录</a>
</div>
</form>
</div>
</div>
</div>
</div>
</div> {% endblock %}
