# ============================================================
#  股票量化分析系统 - Nginx 反向代理配置
#  用途：生产环境部署，SSL 终结 + 静态文件托管 + 反代到 Gunicorn
#  部署路径：/etc/nginx/sites-available/stock-analysis → symlink to sites-enabled
# ============================================================

server {
    listen 80;
    server_name your-domain.com;   # ← 替换为你的实际域名或服务器 IP

    # --- 静态文件由 Nginx 直托（不走 Python，性能最优）---
    location /static/ {
        alias /opt/quantitative_analysis/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- 健康检查端点（不记录日志，减少 I/O）---
    location /healthz {
        proxy_pass http://web:5001;
        access_log off;
    }

    # --- 所有其他请求反代到 Gunicorn ---
    location / {
        proxy_pass http://web:5001;

        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应（AI 助手聊天）必须关闭缓冲
        proxy_buffering off;
        proxy_cache off;

        # 超时设置（回测计算和 LLM 流式可能需要较长时间）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # 限制上传大小（防止大文件攻击）
    client_max_body_size 10m;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}


