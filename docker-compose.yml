services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-analysis-web
    ports:
      - "5001:5001"
    environment:
      # 容器间通信使用 Docker 服务名（不能用 localhost！）
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-stock_user}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=${DB_NAME:-stock_cursor}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - DEBUG=False
      - REDIS_HOST=redis
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TUSHARE_PROXY_URL=${TUSHARE_PROXY_URL:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-plus}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_TIMEOUT=${QWEN_TIMEOUT:-60}
      - QWEN_TEMPERATURE=${QWEN_TEMPERATURE:-0.1}
      - QWEN_MAX_TOKENS=${QWEN_MAX_TOKENS:-2048}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - FLASK_ENV=production
      - GUNICORN_DAEMON=False
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs          # 日志持久化
      - ./data:/app/data          # 数据缓存持久化
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: stock-analysis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/var/www/static:ro
      - ./ssl-certs:/etc/nginx/ssl:ro       # SSL 证书（可选）
    depends_on:
      - web
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: stock-analysis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-stock_cursor}
      # 注意：当 DB_USER=root 时不设置 MYSQL_USER（避免冲突）
      MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
    ports:
      - "3307:3306"          # 映射到 3307 避免和本地 MySQL 冲突
    volumes:
      - mysql_data:/var/lib/mysql           # MySQL 数据持久化
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro   # 初始化 SQL（可选）
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-buffer-pool-size=1G --innodb-log-file-size=256M --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: stock-analysis-redis
    ports:
      - "6380:6379"          # 映射到 6380 避免和本地 Redis 冲突
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
