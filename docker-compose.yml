services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-analysis-web
    ports:
      - "5001:5001"
    environment:
      - DB_HOST=${DB_HOST:-mysql}
      - DB_USER=${DB_USER:-stock_user}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=${DB_NAME:-stock_cursor}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - DEBUG=False
      - REDIS_HOST=${REDIS_HOST:-redis}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - FLASK_ENV=production
      - GUNICORN_DAEMON=False
    volumes:
      - ./logs:/app/logs          # 日志持久化
      - ./data:/app/data          # 数据缓存持久化
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: stock-analysis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/var/www/static:ro
      - ./ssl-certs:/etc/nginx/ssl:ro       # SSL 证书（可选）
    depends_on:
      - web
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: stock-analysis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-stock_cursor}
      MYSQL_USER: ${DB_USER:-stock_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql           # MySQL 数据持久化
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro   # 初始化 SQL（可选）
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image:redis:alpine
    container_name: stock-analysis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
